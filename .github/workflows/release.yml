name: Build and Release Rust Binary

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.target }}
    runs-on: ${{ matrix.run_on }}
    strategy:
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os_name: linux-x86_64
            run_on: ubuntu-latest
            ext: ''
#          - target: aarch64-unknown-linux-gnu
#            os_name: linux-aarch64
#            run_on: ubuntu-latest
#            ext: ''
#          - target: armv7-unknown-linux-gnueabihf
#            os_name: linux-armv7
#            run_on: ubuntu-latest
#            ext: ''

          # macOS (x86 and Apple Silicon)
          - target: x86_64-apple-darwin
            os_name: macos-x86_64
            run_on: macos-latest
            ext: ''
          - target: aarch64-apple-darwin
            os_name: macos-aarch64
            run_on: macos-latest
            ext: ''

          # Windows (x86_64 only)
          - target: x86_64-pc-windows-gnu
            os_name: windows-x86_64
            run_on: ubuntu-latest
            ext: '.exe'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install libudev development package
        if: matrix.run_on == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install cross-compilation tools for Windows
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Install cross-compilation tools for aarch64 Linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross pkg-config

      # Set environment variables for pkg-config cross compilation
      - name: Set environment variables
        if : matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu
          export PKG_CONFIG_PATH=$PKG_CONFIG_SYSROOT_DIR/usr/lib/pkgconfig:$PKG_CONFIG_SYSROOT_DIR/usr/share/pkgconfig
          export PKG_CONFIG=pkg-config

          # Check pkg-config finds libudev.pc for the target
          pkg-config --print-variables libudev || echo "libudev.pc not found"
        env:
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/aarch64-linux-gnu/usr/lib/pkgconfig:/usr/aarch64-linux-gnu/usr/share/pkgconfig
          PKG_CONFIG: pkg-config

      - name: Install cross-compilation tools for armv7 Linux
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross pkg-config

      # Set environment variables for pkg-config cross compilation
      - name: Set environment variables and build
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        env:
          PKG_CONFIG_SYSROOT_DIR: /usr/arm-linux-gnueabihf
          PKG_CONFIG_PATH: /usr/arm-linux-gnueabihf/usr/lib/pkgconfig:/usr/arm-linux-gnueabihf/usr/share/pkgconfig
          PKG_CONFIG: pkg-config
        run: |
          # Verify pkg-config can find target libraries
          pkg-config --print-variables libudev || echo "libudev.pc not found"

      - name: Install OpenSSL on macOS
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          # Ensure Rosetta is installed
          softwareupdate --install-rosetta --agree-to-license || true
          if [ ! -d /usr/local/Homebrew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          
          # install x86 openssl
          arch -x86_64 /usr/local/bin/brew update
          arch -x86_64 /usr/local/bin/brew install openssl@3 pkg-config
      
          # Export x86 OpenSSL env vars
          echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/opt/openssl@3/lib/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/local/opt/openssl@3/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build OpenSSL for Windows cross-compile
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          # Install required packages
          sudo apt-get update
          sudo apt-get install -y build-essential mingw-w64 gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 pkg-config perl wget ca-certificates
      
          OPENSSL_VER=3.1.3
          wget https://www.openssl.org/source/openssl-$OPENSSL_VER.tar.gz
          tar xf openssl-$OPENSSL_VER.tar.gz
          pushd openssl-$OPENSSL_VER
      
          # Configure cross-compile
          ./Configure mingw64 --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=/usr/x86_64-w64-mingw32
          
          # Build static libraries
          make -j$(nproc)
          
          # Install to user-writable DESTDIR
          make DESTDIR=$HOME/win-openssl install_sw
          popd
          
          # Set environment variables for openssl-sys
          echo "OPENSSL_DIR=$HOME/win-openssl/usr/x86_64-w64-mingw32" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$HOME/win-openssl/usr/x86_64-w64-mingw32/lib64" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$HOME/win-openssl/usr/x86_64-w64-mingw32/include" >> $GITHUB_ENV
          
          # For pkg-config
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=$HOME/win-openssl/usr/x86_64-w64-mingw32/lib64/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$HOME/win-openssl/usr/x86_64-w64-mingw32/lib64/pkgconfig" >> $GITHUB_ENV
          
      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-07-04

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os_name }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
              ${{ matrix.os_name }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ matrix.os_name }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os_name }}-cargo-build-

      - name: Build binary
        run: |
          cargo build --release --target=${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          TARGET_DIR=target/${{ matrix.target }}/release
          OUTPUT_NAME=datex-${{ matrix.target }}
          cp ${TARGET_DIR}/datex${{ matrix.ext }} dist/datex${{ matrix.ext }}
          cd dist && zip ${OUTPUT_NAME}.zip datex${{ matrix.ext }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os_name }}
          path: dist/datex-${{ matrix.target }}.zip
    continue-on-error: true
  release:
    name: Create GitHub Draft Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
